<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsPulse</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>News<span>Pulse</span></h1>
            <p>Tap the microphone to generate a custom news broadcast, or ask a follow-up question.</p>
        </header>

        <div id="status-bar" class="hidden">
            <div class="spinner"></div>
            <span id="status-text">Listening...</span>
        </div>

        <div id="flashcards-container" class="grid">
            <!-- Cards will be injected here -->
        </div>

        <div class="controls-container">
            <div class="input-wrapper">
                <button id="input-action-btn" class="input-action-btn hidden" title="Clear Text">
                    <svg id="icon-clear" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
                <input type="text" id="text-input" placeholder="Type a topic or use mic below..." />
            </div>
            
            <div class="action-buttons">
                <!-- Single Dynamic Central Button -->
                <button id="central-btn" class="mic-btn-large" title="Microphone">
                    
                    <!-- State: Microphone -->
                    <svg id="icon-mic" viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="2" fill="none">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="23"></line>
                        <line x1="8" y1="23" x2="16" y2="23"></line>
                    </svg>
                    
                    <!-- State: Pause -->
                    <svg id="icon-pause" class="hidden" viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="2" fill="none">
                        <rect x="6" y="4" width="4" height="16"></rect>
                        <rect x="14" y="4" width="4" height="16"></rect>
                    </svg>
                    
                    <!-- State: Stop/Recording -->
                    <svg id="icon-stop" class="hidden" viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="2" fill="none">
                        <rect x="6" y="6" width="12" height="12"></rect>
                    </svg>
                    
                    <!-- State: Play (Paused State) -->
                    <svg id="icon-play" class="hidden" viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="2" fill="none">
                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                    </svg>
                    
                    <!-- State: Send -->
                    <svg id="icon-send-central" class="hidden" viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="2" fill="none">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>

                </button>
            </div>
        </div>
        
        <audio id="audio-player" style="display: none;"></audio>
    </div>

    <script src="app.js"></script>
</body>
</html>
